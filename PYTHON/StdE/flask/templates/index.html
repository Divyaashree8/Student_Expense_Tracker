<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
</head>
<style>
    body{
        background-image: url("{{url_for('static',filename='bg.jpg')}}");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        height: 100vh;
    }
    .container{
        text-align: center;
        margin-top: 50px;
    }
    input,button{
        padding: 10px;
        margin: 5px;
        border-radius: 8px;
        border: none;
    }
</style>
<body>
    <h1 align="middle">Expense Tracker</h1>
    <form align="middle" method="POST" action="/add">
        <input type="text" name="category" placholder="Category" required>
        <input type="number" name="amount" placeholder="Amount" required>
        <input type="date" name="date" required>
        <br>
        <button type="submit">Add Expense</button>
    </form>
    <h2 align="middle">All Expense</h2>
    <table align="center" border="1">
        <tr>
            <th>Date</th>
            <th> Category</th>
            <th>Amount</th>
        </tr>
        {% for i in expenses %}
        <tr>
            <td>{{i.date}}</td>
            <td>{{i.category}}</td>
            <td>{{i.amount}}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
